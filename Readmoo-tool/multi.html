<!DOCTYPE html>
<html lang="zh-TW">
<head>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#f8f7f2">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Readmoo折扣計算機(多本) 2.4.1</title>
    <style>
        :root {
            /* 強制瀏覽器基礎元件遵循淺色模式 */
            color-scheme: light;
            --page-bg: #e8e6df;
            --app-bg: #f8f7f2;
            --display-bg: #f2f1eb;
            --key-bg: #d6c9c7; 
            --key-text: #ffffff;
            --gold: #b3a58e;
            --milktea: #917c79; 
            --text-main: #6b6a66;
            --card-bg: #f2f1eb;
            --shadow: rgba(0,0,0,0.1);
        }

        [data-theme="dark"] {
            /* 強制瀏覽器基礎元件遵循深色模式 */
            color-scheme: dark;
            --page-bg: #1a1b1d;
            --app-bg: #212224;
            --display-bg: #2a2c2f;
            --key-bg: #3a3d42; 
            --key-text: #fefefe;
            --gold: #d4b889;
            --milktea: #917c79;
            --text-main: #fefefe;
            --card-bg: #2a2c2f;
            --shadow: rgba(0,0,0,0.4);
        }

        [data-theme="dark"] .book-orig {
            color: #ffffff !important;
            opacity: 0.7;
        }

        body {
            font-family: -apple-system, "Noto Sans CJK TC", sans-serif;
            background-color: var(--page-bg);
            margin: 0; padding: 40px 20px;
            display: flex; 
            flex-direction: column;
            align-items: center; 
            justify-content: flex-start;
            min-height: 100vh;
            transition: 0.3s;
        }

        .theme-switch-wrap { position: fixed; top: 20px; right: 20px; z-index: 100; }
        
        .nav-buttons-wrap { 
            position: fixed; 
            bottom: 20px; 
            right: 20px; 
            z-index: 100; 
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        
        .theme-btn {
            background: var(--app-bg); border: 1px solid var(--gold);
            color: var(--gold); border-radius: 20px;
            padding: 6px 15px; cursor: pointer; font-size: 0.8rem;
            transition: 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
        }

        .app-container {
            width: 100%; max-width: 450px;
            background-color: var(--app-bg);
            border-radius: 40px; 
            padding: 35px 25px;
            box-shadow: 0 20px 50px var(--shadow);
            border: 8px solid var(--display-bg);
            box-sizing: border-box;
        }

        .display-area {
            background-color: var(--display-bg);
            border-radius: 20px; padding: 25px;
            text-align: right; margin-bottom: 20px;
        }

        /* 標題列佈局調整 */
        .display-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }
        .display-area .label { color: var(--gold); font-size: 0.9rem; font-weight: bold;}
        
        /* 簡單計算機圓鈕 */
        .link-circle {
        display: flex;
        align-items: center;
        justify-content: center;
        width: 28px;
        height: 28px;
        border-radius: 50%;
        background-color: #ffffff;
        border: 1.5px solid var(--milktea);
        color: var(--milktea);
        text-decoration: none;
        font-weight: bold;
        font-size: 0.9rem;
        transition: 0.2s;
        margin-left: 5px;
        }

        .link-circle:hover {
            background-color: var(--gold);
            color: #ffffff;
        }

        /* 切換按鈕樣式 */
        .switch-links {
            display: flex;
            gap: 6px;
        }
        .link-btn {
            font-size: 0.75rem;
            padding: 4px 12px;
            border-radius: 15px;
            text-decoration: none;
            font-weight: bold;
            transition: 0.2s;
            border: 1px solid var(--milktea);
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .link-single {
            background-color: #ffffff;
            color: var(--milktea);
        }
        .link-multi {
            background-color: var(--milktea);
            color: #ffffff;
        }

        .display-area .price-symbol { color: var(--gold); font-size: 1.8rem; margin-right: 5px; font-weight: bold; }
        .display-area .price-val { color: var(--text-main); font-size: 4rem; font-weight: 700; }

        .keypad {
            display: grid; grid-template-columns: repeat(4, 1fr);
            gap: 12px; margin-bottom: 25px;
        }
        .key {
            background-color: var(--key-bg); color: var(--key-text);
            border: none; border-radius: 12px; height: 60px; 
            font-size: 1.4rem; cursor: pointer; font-weight: 600;
            transition: opacity 0.1s;
        }
        .key:active { opacity: 0.7; }
        .key-c { color: var(--milktea); background-color: var(--display-bg); border: 1px solid var(--key-bg); }
        .key-calc { 
            grid-row: span 2; height: 132px;
            background-color: var(--milktea); color: white;
            font-size: 1.1rem;
        }
        .key-star { color: #ffffff; font-size: 2rem; }

        .summary-box {
            background: var(--display-bg);
            border-radius: 15px; padding: 20px; margin-top: 10px;
        }
        .summary-header {
            color: var(--gold); font-size: 0.9rem; font-weight: bold;
            margin-bottom: 15px; display: flex; justify-content: space-between;
        }
        .summary-notice {
            color: var(--gold); font-size: 0.85rem;
            margin-bottom: 15px; font-weight: 550;
        }

        .book-item {
            margin-bottom: 15px; padding-bottom: 15px;
            border-bottom: 1px dashed var(--gold);
        }
        .book-top-row { display: flex; justify-content: space-between; align-items: flex-start; }
        .book-orig { font-size: 0.8rem; opacity: 0.6; text-decoration: line-through; color: var(--text-main); }
        .book-final-price { font-weight: 800; font-size: 1.2rem; color: var(--milktea); }
        
        .discount-selector {
            display: flex; flex-wrap: wrap; gap: 5px; margin-top: 8px;
        }
        .discount-opt {
            font-size: 0.65rem; padding: 4px 8px; border-radius: 5px;
            border: 1px solid var(--gold); color: var(--gold); cursor: pointer;
            transition: 0.2s;
        }
        .discount-opt.active {
            background-color: var(--gold); color: white;
        }
        .discount-opt.disabled {
            opacity: 0.3; border-color: #ccc; color: #ccc; cursor: not-allowed;
        }

        .remove-btn { color: #cc7a7a; cursor: pointer; margin-left: 10px; font-weight: bold; font-size: 1.2rem;}

        .total-section {
            margin-top: 15px; padding-top: 15px;
            border-top: 2px solid var(--gold);
        }
        
        .total-layout {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
        }
        .total-left {
            flex: 1;
        }
        .total-right {
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            text-align: right;
        }
        
        .batch-status {
            font-size: 0.65rem;
            color: var(--milktea);
            font-weight: bold;
            margin-top: 2px;
        }
        
        .batch-control {
            display: flex;
            align-items: center;
            gap: 5px;
            margin-bottom: 8px;
        }
        .batch-label {
            font-size: 0.65rem; color: var(--gold); font-weight: bold;
        }
        .batch-select {
            background: var(--app-bg);
            border: 1px solid var(--gold);
            color: var(--text-main);
            border-radius: 8px;
            font-size: 0.75rem;
            padding: 2px 4px;
            outline: none;
            cursor: pointer;
        }

        .total-amount-wrap { 
            margin-bottom: 4px;
        }
        .total-label { color: var(--gold); font-weight: bold; margin-right: 5px; font-size: 0.85rem; }
        .total-symbol { color: var(--gold); font-weight: bold; font-size: 1.2rem; }
        .total-amount { color: var(--text-main); font-size: 1.8rem; font-weight: 800; }
        
        .total-sub-info {
            font-size: 0.6rem;
            color: var(--gold);
            opacity: 0.9;
        }

        .init-view { text-align: center; color: var(--gold); margin-top: 20px; padding: 20px; border: 1px dashed var(--gold); border-radius: 15px;}

	/* AP 連結區塊樣式 */
        .promo-container {
            width: 100%; max-width: 450px;
            margin-top: 20px;
            background-color: var(--app-bg);
            border-radius: 20px;
            padding: 20px;
            box-shadow: 0 10px 30px var(--shadow);
            text-align: center;
            box-sizing: border-box;
            border: 2px solid var(--display-bg);
        }
        .promo-text { color: var(--text-main); font-size: 0.85rem; margin-bottom: 12px; line-height: 1.4; }
        .promo-btn {
            display: inline-block;
            background-color: var(--milktea);
            color: #fff;
            text-decoration: none;
            padding: 8px 25px;
            border-radius: 20px;
            font-size: 0.9rem;
            font-weight: bold;
            transition: 0.3s;
            box-shadow: 0 4px 10px var(--shadow);
        }
    </style>
</head>
<body id="top">

<div class="theme-switch-wrap">
    <button class="theme-btn" onclick="toggleTheme()">◐</button>
</div>

<div class="nav-buttons-wrap">
    <button class="theme-btn" onclick="scrollToTop()">▲</button>
    <button class="theme-btn" onclick="scrollToBottom()">▼</button>
</div>

<div class="app-container">
    <div class="display-area">
        <div class="display-header">
            <div class="label">書本售價</div>
            <div class="switch-links">
                <a href="simple.html" class="link-circle" title="簡單計算機">±</a>
                <a href="single.html" class="link-btn link-single">單本</a>
                <a href="multi.html" class="link-btn link-multi">多本</a>
            </div>
        </div>
        <div>
            <span class="price-symbol">$</span>
            <span id="displayVal" class="price-val">0</span>
        </div>
    </div>

    <div class="keypad">
        <button class="key" onclick="press('7')">7</button>
        <button class="key" onclick="press('8')">8</button>
        <button class="key" onclick="press('9')">9</button>
        <button class="key" style="color: var(--gold);" onclick="back()">⌫</button>

        <button class="key" onclick="press('4')">4</button>
        <button class="key" onclick="press('5')">5</button>
        <button class="key" onclick="press('6')">6</button>
        <button class="key key-c" onclick="cls()">C</button>

        <button class="key" onclick="press('1')">1</button>
        <button class="key" onclick="press('2')">2</button>
        <button class="key" onclick="press('3')">3</button>
        <button class="key key-calc" id="btnAdd" onclick="addToCart()">加入<br>清單</button>

        <button class="key" onclick="press('0')">0</button>
        <button class="key" onclick="press('00')">00</button>
        <!-- key-star 長/短按出現不同效果 -->
        <button class="key key-star" 
                onmousedown="startStarTimer()" 
                onmouseup="endStarTimer()" 
                ontouchstart="startStarTimer()" 
                ontouchend="endStarTimer()">*</button>
    </div>

    <div id="cartArea" class="summary-box" style="display: none;">
        <div class="summary-header">
            <span>折扣明細 (按推薦序排列)</span>
            <span id="bookCount">0 本</span>
        </div>
        <div class="summary-notice">-領書額度不適用於部分書籍／套書。</br>-目前領書點數上限訂為10點。</div>
        
        <div id="cartItems"></div>
        
        <div class="total-section">
            <div class="total-layout">
                <div class="total-left">
                    <div id="batchStatus" class="batch-status">當前方案：推薦方案</div>
                </div>
                
                <div class="total-right">
                    <div class="batch-control">
                        <span class="batch-label">一鍵套用</span>
                        <select id="batchSelect" class="batch-select" onchange="batchApplyDiscount(this.value)">
                            <option value="">請選擇...</option>
                            <option value="auto">推薦方案</option>
                            <option value="70off">7折</option>
                            <option value="75off">75折</option>
                            <option value="80off">8折</option>
                            <option id="optCustom" value="custom" style="display:none;">自訂折扣</option>
                        </select>
                    </div>

                    <div class="total-amount-wrap">
                        <span class="total-label">總計金額</span>
                        <span class="total-symbol">$</span>
                        <span id="totalAmount" class="total-amount">0</span>
                    </div>
                    
                    <div class="total-sub-info">
                        合計原價：$<span id="totalOriginal">0</span> | 共省下：$<span id="totalSaved">0</span>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div id="initInfo" class="init-view">
        <div style="font-size: 0.9rem;">輸入金額後「加入清單」<br>「*」短按-自訂折扣，長按-乘法</div>
    </div>
</div>

<div class="promo-container" id="bottom">
    <div class="promo-text">喜歡這個計算機的話，<br>歡迎用 AP 連結小小鼓勵我喔❤</div>
    <a href="https://moo.im/a/clmtBW" target="_blank" class="promo-btn">AP 連結</a>
</div>

<script>
    let currentInput = "0";
    let cart = [];
    let customDiscountRate = null;
    let isPrompting = false;
    let currentGlobalType = "auto"; 
    const COST_PER_POINT = 166.5;

    

    // --- 主題偵測與切換邏輯 ---
    function applySystemTheme() {
        const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
        setTheme(prefersDark ? 'dark' : 'light');
    }

    function setTheme(theme) {
        document.body.setAttribute('data-theme', theme);
        document.body.style.colorScheme = theme;
    }

    function toggleTheme() {
        const current = document.body.getAttribute('data-theme');
        setTheme(current === 'dark' ? 'light' : 'dark');
    }

    // 初始化主題偵測
    applySystemTheme();
    window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', e => {
        setTheme(e.matches ? 'dark' : 'light');
    });

    // --- 計算機邏輯 ---
    window.addEventListener('keydown', function(e) {
        if (isPrompting) return;
        if (e.key >= '0' && e.key <= '9') press(e.key);
        else if (e.key === 'Backspace') back();
        else if (e.key === 'Enter') addToCart();
        else if (e.key === 'Escape' || e.key === 'Delete') cls();
        else if (e.key === '*') setCustomDiscount();
    });

    // --- ▲按鈕 ---
    function scrollToTop() {
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    // --- ▼按鈕 ---
    function scrollToBottom() {
        window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
    }

    // --- 新增：長按偵測變數 ---
    let starTimer;
    let isLongPress = false;

    function startStarTimer() {
        isLongPress = false;
        starTimer = setTimeout(() => {
            isLongPress = true;
            insertStar(); // 觸發長按：插入乘號
        }, 500); // 設定 500 毫秒為長按閾值
    }

    function endStarTimer() {
        clearTimeout(starTimer);
        if (!isLongPress) {
            setCustomDiscount(); // 觸發短按：自訂折扣
        }
    }

    function insertStar() {
        // 避免重複輸入乘號或在開頭輸入
        if (currentInput !== "0" && !currentInput.includes('*')) {
            currentInput += "*";
            update();
        }
    }

    // --- 修改：原本的 press 函數需支援數字輸入至算式末尾 ---
    function press(n) {
        if (currentInput === "0") {
            currentInput = n;
        } else {
            // 限制長度，避免算式過長
            if (currentInput.length < 10) currentInput += n;
        }
        update();
    }

    function cls() { 
        currentInput = "0"; cart = [];
        customDiscountRate = null;
        currentGlobalType = "auto";
        update(); renderCart();
    }

    function back() { 
        currentInput = currentInput.slice(0, -1); 
        if (currentInput === "") currentInput = "0"; 
        update(); 
    }

    // --- 修改：顯示邏輯 ---
    function update() { 
        // 將程式碼內的 * 轉換為視覺上的 ×
        document.getElementById('displayVal').innerText = currentInput.replace('*', '×'); 
    }

    function setCustomDiscount() {
        isPrompting = true;
        let val = prompt("請輸入自訂折扣 (例如: 9 代表 9折，65 代表 65折)\n\n規定：只能輸入 99 以內的數字。\n輸入 0 或取消則移除自訂折扣。\n\n自訂折扣將套至清單內所有書籍，數字可隨時更改；但取消後，若當中有套用「自訂」的書，則該書會跳回預設選項。\n若不想跳掉已選好的配置，請在取消前先檢查。", customDiscountRate ? (customDiscountRate < 1 && (customDiscountRate*100)%10 === 0 ? customDiscountRate * 10 : customDiscountRate * 100) : "");
        
        if (val === null || val === "" || parseFloat(val) === 0) {
            // --- 修正處：取消自訂折扣時的邏輯 ---
            customDiscountRate = null;
            document.getElementById('optCustom').style.display = 'none';
            alert("已移除自訂折扣");

            // 遍歷所有書本，如果該書原本是選「自訂折扣」，才幫它跳回推薦（最便宜）選項
            // 其他原本手動選好的 (如 7折、折50) 則維持不動
            cart.forEach((book, idx) => {
                if (book.selectedId === 'custom') {
                    const sorted = getSortedDiscounts(book.orig);
                    cart[idx].selectedId = sorted[0].id;
                }
            });
            
            // 設為 mixed 模式，避免觸發全域 auto 的重新計算
            currentGlobalType = 'mixed'; 
        } else {
            let num = parseFloat(val);
            if (num > 99) {
                alert("錯誤：只能輸入 99 以內的數字，請重新輸入。");
                isPrompting = false;
                return setCustomDiscount();
            }

            if (num >= 10) num = num / 100;
            else if (num >= 1 && num < 10) num = num / 10;
            customDiscountRate = num;
            document.getElementById('optCustom').style.display = 'block';
            // 設定完新折扣後，維持現狀不變，讓使用者手動去選或用一鍵套用
        }
        isPrompting = false;
        renderCart(); 
    }

    function batchApplyDiscount(type) {
        if (!type || cart.length === 0) return;
        currentGlobalType = type;
        cart.forEach((book, idx) => {
            const sorted = getSortedDiscounts(book.orig);
            if (type === 'auto') {
                cart[idx].selectedId = sorted[0].id;
            } else {
                const target = sorted.find(opt => opt.id === type);
                if (target && target.isPossible) {
                    cart[idx].selectedId = type;
                }
            }
        });
        renderCart();
        document.getElementById('batchSelect').value = "";
    }

    function updateBatchStatusText() {
        const statusDiv = document.getElementById('batchStatus');
        if (!statusDiv) return;

        const typeMap = {
            'auto': '推薦方案',
            '70off': '7折',
            '75off': '75折',
            '80off': '8折',
            'custom': '自訂折扣',
            'mixed': '自訂組合 (已手動調整)'
        };

        statusDiv.innerText = `當前方案：${typeMap[currentGlobalType] || '推薦方案'}`;
    }

    function getSortedDiscounts(p) {
        const points = Math.ceil(p / 250);
        let allOptions = [
            { id: 'off50', name: "折50", final: Math.max(0, p - 50), threshold: 0 },
            { id: '250-50', name: "250-50", final: p - 50, threshold: 250 },
            { id: '150-30', name: "150-30", final: p - 30, threshold: 150 },
            { id: '100-25', name: "100-25", final: p - 25, threshold: 100 },
            { id: '70off', name: "7折", final: p * 0.7, threshold: 0 },
            { id: '75off', name: "3本75折", final: p * 0.75, threshold: 0 },
            { id: '80off', name: "8折", final: p * 0.8, threshold: 0 },
            { id: 'none', name: "原價", final: p, threshold: 0 }
        ];

        if (points <= 10) {
            allOptions.push({ id: 'credit', name: "領書額度", final: points * COST_PER_POINT, threshold: 0, sub: `(${points}點)` });
        }

        if (customDiscountRate !== null) {
            let displayLabel = customDiscountRate * 100;
            if (displayLabel % 10 === 0) displayLabel = displayLabel / 10;
            allOptions.push({ id: 'custom', name: `${displayLabel}折(自訂)`, final: p * customDiscountRate, threshold: 0 });
        }

        const optionsWithStatus = allOptions.map(opt => ({ ...opt, isPossible: p >= opt.threshold }));
        return optionsWithStatus.sort((a, b) => {
            if (a.isPossible !== b.isPossible) return b.isPossible - a.isPossible;
            return a.final - b.final;
        });
    }

    // --- 修改：加入清單邏輯 (支援倍數) ---
    function addToCart() {
        let price, count = 1;

        if (currentInput.includes('*')) {
            const parts = currentInput.split('*');
            price = parseInt(parts[0]);
            count = parseInt(parts[1]) || 1; // 如果 * 後面沒數字，預設為 1
        } else {
            price = parseInt(currentInput);
        }

        if (isNaN(price) || price <= 0) return;

        // 批次加入清單
        for (let i = 0; i < count; i++) {
            const sortedOptions = getSortedDiscounts(price);
            let targetId = sortedOptions[0].id;
            
            if (currentGlobalType !== 'auto' && currentGlobalType !== 'mixed') {
                const target = sortedOptions.find(opt => opt.id === currentGlobalType);
                if (target && target.isPossible) targetId = currentGlobalType;
                else currentGlobalType = 'mixed';
            }

            cart.push({ orig: price, selectedId: targetId });
        }

        currentInput = "0";
        update();
        renderCart();
    }

    function changeDiscount(bookIdx, optId, isPossible) {
        if (!isPossible) return;
        if (cart[bookIdx].selectedId !== optId) {
            cart[bookIdx].selectedId = optId;
            currentGlobalType = 'mixed';
        }
        renderCart();
    }

    function removeFromCart(index) {
        cart.splice(index, 1);
        renderCart();
    }

    function customRound(num) {
        const decimal = num - Math.floor(num);
        return decimal >= 0.6 ? Math.ceil(num) : Math.floor(num);
    }

    function renderCart() {
        const cartArea = document.getElementById('cartArea');
        const itemsDiv = document.getElementById('cartItems');
        const initInfo = document.getElementById('initInfo');
        const totalAmountSpan = document.getElementById('totalAmount');
        const totalOriginalSpan = document.getElementById('totalOriginal');
        const totalSavedSpan = document.getElementById('totalSaved');
        const bookCountSpan = document.getElementById('bookCount');

        if (cart.length === 0) {
            cartArea.style.display = 'none';
            initInfo.style.display = 'block';
            return;
        }

        cartArea.style.display = 'block';
        initInfo.style.display = 'none';
        
        let totalFinal = 0;
        let totalOriginal = 0;

        itemsDiv.innerHTML = cart.map((book, bIdx) => {
            const sortedOptions = getSortedDiscounts(book.orig);
            let selected = sortedOptions.find(opt => opt.id === book.selectedId);
            if (!selected) {
                selected = sortedOptions[0];
                cart[bIdx].selectedId = selected.id;
            }
            const finalRounded = customRound(selected.final);
            totalFinal += finalRounded;
            totalOriginal += book.orig;

            return `
                <div class="book-item">
                    <div class="book-top-row">
                        <div>
                            <div class="book-orig">書本原價 $${book.orig}</div>
                            <div class="book-final-price">$${finalRounded}</div>
                        </div>
                        <span class="remove-btn" onclick="removeFromCart(${bIdx})">×</span>
                    </div>
                    <div class="discount-selector">
                        ${sortedOptions.map((opt) => `
                            <div class="discount-opt ${cart[bIdx].selectedId === opt.id ? 'active' : ''} ${!opt.isPossible ? 'disabled' : ''}" 
                                 onclick="changeDiscount(${bIdx}, '${opt.id}', ${opt.isPossible})">
                                ${opt.name}${opt.sub || ''}
                            </div>
                        `).join('')}
                    </div>
                </div>
            `;
        }).join('');

        bookCountSpan.innerText = `${cart.length} 本`;
        totalAmountSpan.innerText = totalFinal.toLocaleString();
        totalOriginalSpan.innerText = totalOriginal.toLocaleString();
        totalSavedSpan.innerText = (totalOriginal - totalFinal).toLocaleString();
        updateBatchStatusText();
    }
</script>
</body>
</html>
