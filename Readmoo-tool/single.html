<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Readmoo折扣計算機(單本) 2.3</title>
    <style>
        :root {
            /* 強制瀏覽器基礎元件遵循淺色模式 */
            color-scheme: light;
            --page-bg: #e8e6df;
            --app-bg: #f8f7f2;
            --display-bg: #f2f1eb;
            --key-bg: #d6c9c7; 
            --key-text: #ffffff;
            --gold: #b3a58e;
            --milktea: #917c79; 
            --text-main: #6b6a66;
            --card-bg: #f2f1eb;
            --shadow: rgba(0,0,0,0.1);
        }

        [data-theme="dark"] {
            /* 強制瀏覽器基礎元件遵循深色模式 */
            color-scheme: dark;
            --page-bg: #1a1b1d;
            --app-bg: #212224;
            --display-bg: #2a2c2f;
            --key-bg: #3a3d42; 
            --key-text: #fefefe;
            --gold: #d4b889;
            --milktea: #917c79;
            --text-main: #fefefe;
            --card-bg: #2a2c2f;
            --shadow: rgba(0,0,0,0.4);
        }


        body {
            font-family: -apple-system, "Noto Sans CJK TC", sans-serif;
            background-color: var(--page-bg);
            margin: 0; padding: 40px 20px;
            display: flex; 
            flex-direction: column;
            align-items: center; 
            justify-content: flex-start;
            min-height: 100vh;
            transition: 0.3s;
        }

        .theme-switch-wrap { position: fixed; top: 20px; right: 20px; z-index: 100; }
        .theme-btn {
            background: var(--app-bg); border: 1px solid var(--gold);
            color: var(--gold); border-radius: 20px;
            padding: 6px 15px; cursor: pointer; font-size: 0.8rem;
            transition: 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
        }

        .app-container {
            width: 100%; max-width: 450px;
            background-color: var(--app-bg);
            border-radius: 40px; 
            padding: 35px 25px; /* 稍微縮小內距 */
            box-shadow: 0 20px 50px var(--shadow);
            border: 8px solid var(--display-bg);
            box-sizing: border-box;
        }

        /* 調整顯示區域大小，使其與多本一致 */
        .display-area {
            background-color: var(--display-bg);
            border-radius: 20px; padding: 25px;
            text-align: right; margin-bottom: 20px;
        }

        .display-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }
        .display-header .label { 
            color: var(--gold); 
            font-size: 0.9rem; 
            font-weight: bold;
        }

        /* 簡單計算機圓鈕 */
        .link-circle {
        display: flex;
        align-items: center;
        justify-content: center;
        width: 28px;
        height: 28px;
        border-radius: 50%;
        background-color: #ffffff;
        border: 1.5px solid var(--milktea);
        color: var(--milktea);
        text-decoration: none;
        font-weight: bold;
        font-size: 0.9rem;
        transition: 0.2s;
        margin-left: 5px;
        }

        .link-circle:hover {
            background-color: var(--gold);
            color: #ffffff;
        }

        /* 切換按鈕樣式 */
        .switch-links {
            display: flex;
            gap: 6px;
        }
        .link-btn {
            font-size: 0.75rem;
            padding: 4px 12px;
            border-radius: 15px;
            text-decoration: none;
            font-weight: bold;
            transition: 0.2s;
            border: 1px solid var(--milktea);
            display: flex;
            align-items: center;
            justify-content: center;
        }
	    .link-single {
			background-color: var(--milktea);
            color: #ffffff;
        }
        .link-multi {
            background-color: #ffffff;
            color: var(--milktea);
        }
        
        .display-area .price-symbol { color: var(--gold); font-size: 1.8rem; margin-right: 5px; font-weight: bold; }
        .display-area .price-val { color: var(--text-main); font-size: 4rem; font-weight: 700; }

        /* 鍵盤區域參考多本設定 */
        .keypad {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            grid-template-rows: repeat(4, 60px);
            gap: 12px;
            margin-bottom: 25px;
            grid-template-areas: 
                "n7 n8 n9 btnC"
                "n4 n5 n6 btnC"
                "n1 n2 n3 btnC"
                "n0 n00 bk btnC";
        }

        .key {
            background-color: var(--key-bg); color: var(--key-text);
            border: none; border-radius: 12px; height: 60px;
            font-size: 1.4rem; cursor: pointer; font-weight: 600;
            transition: transform 0.1s;
        }
        .key:active { transform: scale(0.95); opacity: 0.7; }

        .key-n7 { grid-area: n7; } .key-n8 { grid-area: n8; } .key-n9 { grid-area: n9; }
        .key-n4 { grid-area: n4; } .key-n5 { grid-area: n5; } .key-n6 { grid-area: n6; }
        .key-n1 { grid-area: n1; } .key-n2 { grid-area: n2; } .key-n3 { grid-area: n3; }
        .key-n0 { grid-area: n0; } .key-n00 { grid-area: n00; } .key-bk { grid-area: bk; }
        .key-c { 
            grid-area: btnC; 
            height: 100%;
            background-color: var(--milktea) !important;
            font-size: 1.8rem;
            border-radius: 15px;
        }

        .init-view { text-align: center; color: var(--gold); margin-top: 20px; padding: 20px; border: 1px dashed var(--gold); border-radius: 15px;}

        .results-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-top: 10px;
            display: none; 
        }

        .coupon-card {
            background-color: var(--card-bg); border-radius: 15px;
            padding: 12px 5px; text-align: center; border: 1.5px solid transparent;
            display: flex; flex-direction: column; justify-content: center;
            transition: 0.3s;
            min-width: 0;
        }
        .coupon-card.best { border-color: var(--gold); position: relative; }
        .best-tag {
            font-size: 0.6rem; color: var(--gold);
            border: 1px solid var(--gold); border-radius: 10px;
            padding: 2px 8px; align-self: center; margin-bottom: 5px;
        }
        .coupon-name { font-size: 0.75rem; color: var(--gold); font-weight: bold; }
        .coupon-price { font-size: 1.3rem; color: var(--text-main); font-weight: bold; }
        .coupon-save { font-size: 0.7rem; color: var(--gold); height: 1rem; }
        .coupon-desc { font-size: 0.6rem; color: var(--text-main); opacity: 0.7; }

        .tooltip-area { margin-top: 20px; padding-top: 15px; border-top: 1px solid var(--gold); display: none; }
        .tooltip-text { color: var(--text-main); font-size: 0.85rem; border-left: 3px solid var(--milktea); padding-left: 10px; }

        /* AP 連結區塊樣式 */
        .promo-container {
            width: 100%; max-width: 450px;
            margin-top: 20px;
            background-color: var(--app-bg);
            border-radius: 20px;
            padding: 20px;
            box-shadow: 0 10px 30px var(--shadow);
            text-align: center;
            box-sizing: border-box;
            border: 2px solid var(--display-bg);
        }
        .promo-text { color: var(--text-main); font-size: 0.85rem; margin-bottom: 12px; line-height: 1.4; }
        .promo-btn {
            display: inline-block;
            background-color: var(--milktea);
            color: #fff;
            text-decoration: none;
            padding: 8px 25px;
            border-radius: 20px;
            font-size: 0.9rem;
            font-weight: bold;
            transition: 0.3s;
            box-shadow: 0 4px 10px var(--shadow);
        }
    </style>
</head>
<body>

<div class="theme-switch-wrap">
    <button class="theme-btn" onclick="toggleTheme()">◐</button>
</div>

<div class="app-container">
    <div class="display-area">
        <div class="display-header">
            <div class="label">書本售價</div>
            <div class="switch-links">
                <a href="simple.html" class="link-circle" title="簡單計算機">±</a>
                <a href="single.html" class="link-btn link-single">單本</a>
                <a href="multi.html" class="link-btn link-multi">多本</a>
            </div>
        </div>
        <div><span class="price-symbol">$</span>
	<span id="displayVal" class="price-val">0</span></div>
    </div>

    <div class="keypad">
        <button class="key key-n7" onclick="press('7')">7</button>
        <button class="key key-n8" onclick="press('8')">8</button>
        <button class="key key-n9" onclick="press('9')">9</button>
        <button class="key key-n4" onclick="press('4')">4</button>
        <button class="key key-n5" onclick="press('5')">5</button>
        <button class="key key-n6" onclick="press('6')">6</button>
        <button class="key key-n1" onclick="press('1')">1</button>
        <button class="key key-n2" onclick="press('2')">2</button>
        <button class="key key-n3" onclick="press('3')">3</button>
        <button class="key key-n0" onclick="press('0')">0</button>
        <button class="key key-n00" onclick="press('00')">00</button>
        <button class="key key-bk" style="color: var(--gold);" onclick="back()">⌫</button>
        <button class="key key-c" onclick="cls()">C</button>
    </div>

    <div id="initInfo" class="init-view">
	<div style="font-size: 0.9rem;">點擊數字或鍵盤輸入</br>領書額度上限訂為10點</div>
    </div>
    <div id="results" class="results-grid"></div>
    <div id="tooltip" class="tooltip-area"><div id="bestNote" class="tooltip-text"></div></div>
</div>

<div class="promo-container">
    <div class="promo-text">喜歡這個計算機的話，<br>歡迎用 AP 連結小小鼓勵我喔❤</div>
    <a href="https://moo.im/a/clmtBW" target="_blank" class="promo-btn">AP 連結</a>
</div>

<script>
    let currentInput = "0";
    const COST_PER_POINT = 166.5;
    const MAX_CREDITS = 10;

    // --- 主題偵測與切換邏輯 ---
    function applySystemTheme() {
        const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
        setTheme(prefersDark ? 'dark' : 'light');
    }

    function setTheme(theme) {
        document.body.setAttribute('data-theme', theme);
        document.body.style.colorScheme = theme;
    }

    function toggleTheme() {
        const current = document.body.getAttribute('data-theme');
        setTheme(current === 'dark' ? 'light' : 'dark');
    }

    // 初始化主題偵測
    applySystemTheme();
    window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', e => {
        setTheme(e.matches ? 'dark' : 'light');
    });

    // 鍵盤監聽：修正判斷邏輯
    window.addEventListener('keydown', function(e) {
        // 數字鍵
        if (e.key >= '0' && e.key <= '9') {
            press(e.key);
        }
        // 退格鍵
        else if (e.key === 'Backspace') {
            back();
        }
        // 清除鍵
        else if (e.key.toLowerCase() === 'c' || e.key === 'Escape' || e.key === 'Delete') {
            cls();
        }
    });

    function press(n) {
        // 限制最多 6 位數
        if (currentInput === "0") {
            currentInput = n;
        } else {
            if (currentInput.length < 6) currentInput += n;
        }
        update();
        calculate();
    }

    function back() {
        currentInput = currentInput.slice(0, -1);
        if (currentInput === "") currentInput = "0";
        update();
        calculate();
    }

    function cls() {
        currentInput = "0"; 
        update();
        document.getElementById('results').style.display = 'none';
        document.getElementById('tooltip').style.display = 'none';
        document.getElementById('initInfo').style.display = 'block';
    }

    function update() { 
        document.getElementById('displayVal').innerText = currentInput; 
    }

    function customRound(val) {
        const integerPart = Math.floor(val);
        const decimalPart = val - integerPart;
        // 0.6 進位邏輯
        return decimalPart >= 0.59999 ? integerPart + 1 : integerPart;
    }

    function calculate() {
        const p = parseInt(currentInput);
        if (p === 0 || isNaN(p)) { 
            // 如果輸入為 0，則回到初始狀態，不顯示結果
            document.getElementById('results').style.display = 'none';
            document.getElementById('tooltip').style.display = 'none';
            document.getElementById('initInfo').style.display = 'block';
            return; 
        }

        document.getElementById('initInfo').style.display = 'none';
        document.getElementById('results').style.display = 'grid';
        document.getElementById('tooltip').style.display = 'block';

        const pointsNeeded = Math.ceil(p / 250);
        const creditCost = pointsNeeded * COST_PER_POINT;

        // 定義所有優惠方案
        const schemes = [
            { id: "fixed250", name: "滿250折50", threshold: 250, calc: (p) => p - 50, desc: "滿$250可用" },
            { id: "fixed150", name: "滿150折30", threshold: 150, calc: (p) => p - 30, desc: "滿$150可用" },
            { id: "fixed100", name: "滿100折25", threshold: 100, calc: (p) => p - 25, desc: "滿$100可用" },
            { id: "unlimited50", name: "不限額折50", threshold: 0, calc: (p) => Math.max(0, p - 50), desc: "不限金額折$50" },
            { id: "off70", name: "7折券", threshold: 0, calc: (p) => p * 0.7, desc: "7折優惠券" },
            { id: "off75", name: "75折券", threshold: 0, calc: (p) => p * 0.75, desc: "3本以上75折" },
            { id: "off80", name: "8折券", threshold: 0, calc: (p) => p * 0.8, desc: "單本8折" },
            { 
                id: "credit", 
                name: "領書額度", 
                threshold: 0, 
                isValid: pointsNeeded <= MAX_CREDITS, 
                calc: (p) => creditCost, 
                desc: `消耗 ${pointsNeeded} 點` 
            },
            { id: "original", name: "原價", threshold: 0, calc: (p) => p, desc: "無折扣" }
        ];

        // 計算各方案最終金額
        let activeSchemes = schemes
            .map(s => {
                const isActive = p >= s.threshold && (s.id !== 'credit' || s.isValid);
                const rawPrice = isActive ? s.calc(p) : p;
                const finalPrice = customRound(rawPrice);
                return {
                    ...s,
                    isActive: isActive,
                    finalPrice: finalPrice,
                    save: p - finalPrice
                };
            })
            .filter(s => s.isActive);

        // 核心修改：依照金額排序，但不去重（拔掉相同金額篩選機制）
        activeSchemes.sort((a, b) => a.finalPrice - b.finalPrice);

        const resDiv = document.getElementById('results');
        resDiv.innerHTML = activeSchemes.map((s, i) => {
            // 只要是清單中的第一個（最小金額），就標註最划算
            // 如果有多個方案並列最低價，它們都會顯示，但只有排序首位會帶標籤，或者您可以改成全部最低價都帶標籤
            const isBest = i === 0;
            return `
                <div class="coupon-card ${isBest ? 'best' : ''}">
                    ${isBest ? '<span class="best-tag">最划算</span>' : ''}
                    <div class="coupon-name">${s.name}</div>
                    <div class="coupon-price">$${s.finalPrice}</div>
                    <div class="coupon-save">${s.save > 0 ? '省 $' + s.save : ''}</div>
                    <div class="coupon-desc">${s.desc}</div>
                </div>
            `;
        }).join('');

        const best = activeSchemes[0];
        document.getElementById('bestNote').innerText = best ? `${best.name}最划算，換算成本約 $${best.finalPrice}。` : "";
    }
</script>
